[global]
server_name = "sky0cloud.dpdns.org"
new_user_displayname_suffix = ""
address = ["0.0.0.0"]
port = 6167

database_path = "/data"

allow_registration = true
grant_admin_to_first_user = true
allow_guest_registration = false

max_request_size = 52_428_800

# Ryzen 3 + 8 GB RAM tuning
# Keep worker counts conservative to avoid HDD seek amplification.
db_pool_workers = 6
db_pool_workers_limit = 12
db_pool_max_workers = 24

# Cache budget for 8 GB host; leaves RAM for kernel page cache and Caddy.
cache_capacity_modifier = 1.4

# RocksDB tuning for spinning disks.
rocksdb_optimize_for_spinning_disks = true
rocksdb_direct_io = false
rocksdb_parallelism_threads = 2
rocksdb_compression_algo = "lz4"
rocksdb_level_compaction_dynamic_level_bytes = true
rocksdb_max_log_files = 4

trusted_servers = ["matrix.org", "sky0cloud.dpdns.org"]
query_trusted_key_servers_first = true

log = "info"
log_colors = true
log_compact = true

[email]
smtp_host = "smtp.mailgun.org"
smtp_port = 587
smtp_user = "official@no-reply.skyservers.qzz.io"
smtp_pass = "be0576***************************"
smtp_from = "Sky0Cloud <official@no-reply.skyservers.qzz.io>"
require_transport_security = true
require_verification = true
