[global]

# --- CORE ---
server_name = "sky0cloud.dpdns.org"
database_path = "/var/lib/tuwunel"
new_user_displayname_suffix = ""

# --- NETWORK ---
address = ["0.0.0.0"]
port = 6167

# --- REGISTRATION (OPEN SETUP) ---
allow_registration = true
registration_token = "itoldyou"
yes_i_am_very_very_sure_i_want_an_open_registration_server_prone_to_abuse = true
allow_guest_registration = true
log_guest_registrations = true

# --- AUTO JOIN ---
  auto_join_rooms = [
   "!APPFlzZKQgCXLWGrVR:sky0cloud.dpdns.org",
   "!pTBO5J0iGIEySYJZTm:sky0cloud.dpdns.org"
]

# --- PERFORMANCE (OPTIMIZED FOR 8GB RAM) ---
cache_capacity_modifier = 2.0
client_sync_timeout_min = 300
client_sync_timeout_default = 600
client_sync_timeout_max = 900
max_request_size = 52428800

# --- DATABASE THREADING (Ryzen 3 SAFE LIMITS) ---
db_pool_workers = 16
db_pool_workers_limit = 32
db_pool_max_workers = 128

# --- ROCKSDB (HDD OPTIMIZED) ---
rocksdb_optimize_for_spinning_disks = true
rocksdb_direct_io = false
rocksdb_parallelism_threads = 4
rocksdb_compression_algo = "lz4"
rocksdb_max_log_files = 3
rocksdb_log_time_to_roll = 86400

# --- FEDERATION ---
allow_federation = true
trusted_servers = ["sky0cloud.dpdns.org", "matrix.org"]
max_join_attempts_per_join_request = 5
query_trusted_key_servers_first = true

# --- PRESENCE ---
allow_local_presence = true
allow_incoming_presence = true
allow_outgoing_presence = true
presence_idle_timeout_s = 300
presence_offline_timeout_s = 1800

# --- TYPING / READ RECEIPTS ---
allow_incoming_typing = true
allow_outgoing_typing = true
allow_incoming_read_receipts = true
allow_outgoing_read_receipts = true

# --- MEDIA / STORAGE SAFETY ---
media_startup_check = true

# --- LOGGING ---
log = "info"
log_colors = true
log_compact = true

# --- ADMIN ---
grant_admin_to_first_user = true
create_admin_room = true
admin_room_notices = true
