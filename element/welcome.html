<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky0Cloud | Welcome</title>
  <style>
    :root {
      --bg-overlay: rgba(3, 8, 18, 0.66);
      --card-bg: rgba(10, 18, 32, 0.72);
      --card-border: rgba(255, 255, 255, 0.16);
      --text-main: #f4f8ff;
      --text-muted: #b7c6df;
      --accent: #41d8ff;
      --accent-2: #2a98ff;
      --radius-xl: 22px;
      --radius-lg: 14px;
      --shadow: 0 24px 56px rgba(0, 0, 0, 0.48);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text-main);
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url("background.jpg") center center / cover no-repeat fixed;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .welcome-card {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .panel {
      padding: 38px 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 320px;
    }

    .panel-left {
      border-right: 1px solid rgba(255, 255, 255, 0.11);
    }

    .eyebrow {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0 14px;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      line-height: 1.25;
    }

    .description {
      margin: 0;
      color: var(--text-muted);
      line-height: 1.6;
      font-size: 1rem;
      max-width: 34ch;
    }

    .actions {
      margin-top: 26px;
      display: grid;
      gap: 10px;
      max-width: 300px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      font-weight: 600;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      border: 1px solid transparent;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-login {
      color: #02131f;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    .btn-signup {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .brand-wrap {
      align-items: center;
      text-align: center;
      gap: 12px;
    }

    .brand-logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.16);
      padding: 8px;
    }

    .brand-title {
      margin: 4px 0 0;
      font-size: clamp(1.5rem, 2.4vw, 2rem);
    }

    .brand-subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.98rem;
    }

    @media (max-width: 840px) {
      .welcome-card {
        grid-template-columns: 1fr;
      }

      .panel-left {
        border-right: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.11);
      }

      .panel {
        min-height: auto;
      }

      .actions {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="welcome-card" aria-label="Sky0Cloud welcome card">
    <section class="panel panel-left" aria-labelledby="welcome-question">
      <p class="eyebrow">sky0cloud.dpdns.org</p>
      <h1 id="welcome-question">Are you logging into Sky0Cloud or signing up?</h1>
      <p class="description">Choose an option below to continue into the Sky0Cloud Matrix environment.</p>
      <div class="actions" role="navigation" aria-label="Authentication actions">
        <a class="btn btn-login" href="/#/login">Login</a>
        <a class="btn btn-signup" href="/#/register">Sign up</a>
      </div>
    </section>

    <section class="panel brand-wrap" aria-labelledby="brand-title">
      <img class="brand-logo" src="icon.png" alt="Sky0Cloud icon" width="80" height="80" />
      <h2 class="brand-title" id="brand-title">Welcome to Sky0Cloud</h2>
      <p class="brand-subtitle">Secure messaging powered by Element Web and Matrix.</p>
    </section>
  </main>
</body>
</html>
