<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky0Cloud | Welcome</title>
  <style>
    :root {
      --bg-overlay: rgba(6, 10, 18, 0.62);
      --card-bg: rgba(10, 16, 28, 0.68);
      --card-border: rgba(255, 255, 255, 0.16);
      --text-main: #eef3ff;
      --text-muted: #b8c2d8;
      --primary: #0dbd8b;
      --primary-hover: #0aa076;
      --secondary-bg: rgba(255, 255, 255, 0.08);
      --secondary-border: rgba(255, 255, 255, 0.22);
      --radius-lg: 20px;
      --radius-md: 12px;
      --shadow: 0 18px 44px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-main);
      background:
        linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url("background.jpg") center center / cover no-repeat fixed;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(920px, 100%);
      min-height: 380px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-radius: var(--radius-lg);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .column {
      padding: 38px 34px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    .left {
      border-right: 1px solid rgba(255, 255, 255, 0.08);
    }

    .server-pill {
      display: inline-block;
      font-size: 0.82rem;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      padding: 6px 12px;
      width: fit-content;
    }

    .title {
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      line-height: 1.25;
      letter-spacing: 0.01em;
    }

    .subtitle {
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 40ch;
    }

    .actions {
      margin-top: 4px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .button {
      text-decoration: none;
      padding: 11px 20px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
      border: 1px solid transparent;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button-login {
      color: #04130d;
      background: linear-gradient(135deg, var(--primary), #11d79c);
    }

    .button-login:hover {
      background: linear-gradient(135deg, var(--primary-hover), #10be8a);
    }

    .button-signup {
      color: var(--text-main);
      background: var(--secondary-bg);
      border-color: var(--secondary-border);
    }

    .button-signup:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .brand {
      align-items: center;
      text-align: center;
      gap: 14px;
    }

    .logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .brand-title {
      font-size: clamp(1.5rem, 2.4vw, 2rem);
      line-height: 1.2;
    }

    .brand-meta {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    @media (max-width: 780px) {
      .card {
        grid-template-columns: 1fr;
      }

      .left {
        border-right: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .column {
        padding: 28px 22px;
      }

      .actions {
        width: 100%;
      }

      .button {
        flex: 1 1 150px;
      }
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Sky0Cloud welcome card">
    <section class="column left">
      <span class="server-pill">sky0cloud.dpdns.org</span>
      <h1 class="title">Are you logging into Sky0Cloud or signing up?</h1>
      <p class="subtitle">Make an account to continue to Sky0Cloud. New here? Create an account to get started.</p>
      <div class="actions" role="navigation" aria-label="Authentication actions">
        <a class="button button-login" href="#/login">Login</a>
        <a class="button button-signup" href="#/register">Sign up</a>
      </div>
    </section>

    <section class="column brand">
      <img class="logo" src="icon.png" alt="Sky0Cloud" width="80" height="80" />
      <h2 class="brand-title">Welcome to Sky0Cloud</h2>
      <p class="brand-meta">Secure communication with ETEE with sky0cloud.dpdns.org</p>
    </section>
  </main>
</body>
</html>
