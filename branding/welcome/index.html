<!doctype html>
<html lang="en">
<head>
  <script>
    (function () {
      try {
        if (localStorage.getItem('mx_access_token')) {
          window.location.replace('/#/home');
        }
      } catch (_) {}
    })();
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Sky0Cloud</title>
  <meta name="theme-color" content="#1f2330" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sky0Cloud" />
  <meta name="application-name" content="Sky0Cloud" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/welcome-style.css" />
</head>
<body>
  <div class="wrap" id="welcome-host">
    <main class="card" role="region" aria-labelledby="welcome-title">
      <section class="left">
        <h1 id="welcome-title">Welcome to Sky0Cloud</h1>
        <p class="sub">Secure Matrix messaging for your community.</p>

        <div class="actions" role="navigation" aria-label="Authentication actions">
          <a id="loginLink" class="btn btn-primary btn-link" href="/#/login" target="_parent">Login</a>
          <a id="signupLink" class="btn btn-secondary btn-link" href="/#/register" target="_parent">Sign up</a>
        </div>

        <p class="status" aria-live="polite">Registration requires an invite token.</p>
      </section>

      <aside class="right" aria-hidden="false">
        <img src="/logo.png" alt="Sky0Cloud logo" class="logo" />
        <h2 class="brand-title">SKY0CLOUD</h2>

        <div class="language-dock" aria-label="Language selector dock">
          <span class="language-label">&gt;&gt;</span>
          <div id="languagePickerSlot"></div>
          <span class="language-label">&lt;&lt;</span>
        </div>
      </aside>
    </main>
  </div>

  <script src="/welcome.js" defer></script>
</body>
</html>
