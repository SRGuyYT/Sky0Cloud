<!doctype html>
<html lang="en">
<head>
  <script>
    (function () {
      try {
        if (localStorage.getItem('mx_access_token')) {
          window.location.replace('/#/home');
        }
      } catch (_) {}
    })();
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Sky0Cloud v4</title>
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sky0Cloud" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Sky0Cloud" />
  <link rel="icon" type="image/png" href="/logo.png?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/welcome-style.css" />
</head>
<body>
  <div id="bg" class="bg" aria-hidden="true"></div>
  <div class="bg-overlay" aria-hidden="true"></div>

  <header class="client-bar" aria-label="Client downloads">
    <a target="_blank" rel="noopener noreferrer" href="https://apps.apple.com/app/element-messenger/id1083446067">Cenddy</a>
    <a target="_blank" rel="noopener noreferrer" href="https://apps.apple.com/app/fluffychat/id1551469600">FluffyChat</a>
    <a target="_blank" rel="noopener noreferrer" href="https://schildi.chat/">SchildiChat</a>
  </header>

  <main class="shell" role="main">
    <section class="glass-card" aria-labelledby="welcome-title">
      <div class="top-row">
        <h1 id="welcome-title" data-i18n="title">Sky0Cloud v4</h1>
        <select id="langPicker" class="lang" aria-label="Language">
          <option value="en">English</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
        </select>
      </div>

      <p class="subtitle" data-i18n="subtitle">Secure, fast Matrix messaging built for your network.</p>

      <a id="signupBtn" class="btn btn-primary" href="/#/register" target="_parent" data-i18n="create_account">Create an Account</a>
      <a id="loginLink" class="login-link" href="/#/login" target="_parent" data-i18n="login">Already have an account? Login</a>

      <p id="status" class="status" data-i18n="status">Registration requires invite token: check your email for more info</p>
    </section>
  </main>

  <script src="/welcome.js?v=2" defer></script>
</body>
</html>
