<!doctype html>
<html lang="en">
<head>
  <script>
    (function () {
      try {
        if (localStorage.getItem('mx_access_token')) {
          window.location.replace('/#/home');
        }
      } catch (_) {}
    })();
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Sky0Cloud</title>
  <meta name="theme-color" content="#1f2330" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sky0Cloud" />
  <meta name="application-name" content="Sky0Cloud" />
  <link rel="icon" type="image/png" href="/logo.png?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/welcome-style.css" />
</head>
<body>
  <header class="client-bar" aria-label="Client downloads">
    <a href="https://apps.apple.com/app/element-messenger/id1083446067" target="_blank" rel="noopener noreferrer">Element iOS</a>
    <a href="https://play.google.com/store/apps/details?id=im.vector.app" target="_blank" rel="noopener noreferrer">Element Android</a>
    <a href="https://fluffychat.im" target="_blank" rel="noopener noreferrer">FluffyChat</a>
    <a href="https://schildi.chat/" target="_blank" rel="noopener noreferrer">SchildiChat</a>
    <label class="lang-wrap" for="langSelect">
      <span id="langLabel">Language</span>
      <select id="langSelect" aria-label="Language selector">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
      </select>
    </label>
  </header>

  <div class="wrap" id="welcome-host">
    <main class="card" role="region" aria-labelledby="welcome-title">
      <section class="left">
        <h1 id="welcome-title">Welcome to Sky0Cloud</h1>
        <p id="welcomeSub" class="sub">Secure Matrix messaging for your community.</p>

        <div class="actions" role="navigation" aria-label="Authentication actions">
          <a id="loginLink" class="btn btn-primary btn-link" href="/#/login" target="_parent">Login</a>
          <a id="signupLink" class="btn btn-secondary btn-link" href="/#/register" target="_parent">Sign up</a>
        </div>

        <p id="tokenHint" class="status" aria-live="polite">Registration requires an invite token.</p>
      </section>

      <aside class="right" aria-hidden="false">
        <img src="/logo.png?v=2" alt="Sky0Cloud logo" class="logo" />
        <h2 class="brand-title">SKY0CLOUD</h2>
      </aside>
    </main>
  </div>

  <script src="/welcome.js" defer></script>
</body>
</html>
