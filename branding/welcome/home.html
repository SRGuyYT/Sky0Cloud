<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sky0Cloud" />
  <script>
    try {
      if (localStorage.getItem('mx_access_token')) {
        window.location.replace('/#/home');
      }
    } catch (_) {}
  </script>
  <title>Sky0Cloud v4</title>
  <link rel="icon" type="image/png" href="/logo.png?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/home-style.css?v=3" />
</head>
<body>
  <div id="bg" class="bg" aria-hidden="true"></div>
  <div class="overlay" aria-hidden="true"></div>

  <main class="host" role="main">
    <section class="glass" aria-labelledby="title">
      <h1 id="title">Sky0Cloud v4</h1>

      <p class="subtitle">The Sky0Cloud Offical Chat Server</p>

      <a class="cta" href="/#/register" target="_parent">Create an Account</a>
      <a class="login" href="/#/login" target="_parent">Already have an account? Login</a>

      <p class="note">Registration will require an invite token</p>
    </section>
  </main>

  <script src="/home.js?v=3" defer></script>
</body>
</html>
