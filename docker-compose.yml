services:
  element-web:
    image: vectorim/element-web:latest
    container_name: element-skyservers
    restart: always
    volumes:
      - ./branding/config.json:/usr/share/nginx/html/config.json
      - ./branding/welcome/index.html:/usr/share/nginx/html/welcome.html
      - ./branding/welcome/welcome.js:/usr/share/nginx/html/welcome.js
      - ./branding/welcome/style.css:/usr/share/nginx/html/welcome-style.css
      - ./branding/logo.png:/usr/share/nginx/html/logo.png
      - ./branding/background.jpg:/usr/share/nginx/html/background.jpg
      - ./branding/manifest.json:/usr/share/nginx/html/manifest.json
