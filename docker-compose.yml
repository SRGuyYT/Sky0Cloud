services:
  conduwuit:
    image: ghcr.io/matrix-construct/tuwunel:latest
    container_name: sky0cloud-conduwuit
    volumes:
      - conduwuit_data:/data
      # Mount the static TOML configuration into the container
      - ./conduwuit/conduwuit.toml:/etc/conduwuit/conduwuit.toml:ro
    environment:
      - TZ=UTC
      # Tell Conduwuit where to find its TOML configuration
      - CONDUIT_CONFIG=/etc/conduwuit/conduwuit.toml
      - CONDUWUIT_CONFIG=/etc/conduwuit/conduwuit.toml
    restart: unless-stopped
    # Ensure Conduwuit is available before other services that depend on it
  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element
    volumes:
      # Provide the Element configuration to the official image
      - ./element/config.json:/app/config.json:ro
    environment:
      - TZ=UTC
    restart: unless-stopped
    depends_on:
      - conduwuit
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'Element' /app/index.html || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 3
    pull_policy: never

  caddy:
    image: caddy:2
    container_name: sky0cloud-caddy
    environment:
      - DOMAIN=sky0cloud.dpdns.org
      - ACME_EMAIL=official@no-reply.skyservers.qzz.io
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Serve Matrix discovery files from the host well-known directory
      - ./well-known:/srv/well-known:ro
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "caddy", "list-modules"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  conduwuit_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
