services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./certs:/certs
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - element-web
      - tuwunel

  element-web:
    image: vectorim/element-web:latest
    container_name: element-web
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json
      - ./element/icon.png:/app/icon.png
      - ./element/background.jpg:/app/background.jpg
      - ./element/manifest.json:/app/manifest.json
      - ./element/sw.js:/app/sw.js
      - ./.well-known:/usr/share/nginx/html/.well-known
    expose:
      - "80"

  tuwunel:
    image: ghcr.io/matrix-construct/tuwunel:latest
    container_name: tuwunel
    restart: unless-stopped
    command: ["-c", "/etc/tuwunel.toml"]
    volumes:
      - ./tuwunel/tuwunel.toml:/etc/tuwunel.toml
      - ./tuwunel_data:/data
    expose:
      - "6167"

  synapse-admin:
    image: etkecc/synapse-admin:latest
    container_name: synapse-admin
    restart: unless-stopped
    expose:
      - "80"

volumes:
  caddy_data:
  caddy_config:
