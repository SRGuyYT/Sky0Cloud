services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - sky0cloud_net

  tuwunel:
    image: ghcr.io/matrix-construct/tuwunel:latest
    container_name: tuwunel
    restart: unless-stopped
    command: ["-c", "/etc/tuwunel.toml"]
    volumes:
      - ./tuwunel/tuwunel.toml:/etc/tuwunel.toml
      - ./tuwunel_data:/data
    networks:
      - sky0cloud_net

  element-web:
    image: vectorim/element-web:latest
    container_name: element-web
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json
      - ./element/icon.png:/app/icon.png
      - ./element/background.jpg:/app/background.jpg
      - ./element/manifest.json:/app/manifest.json
      - ./element/sw.js:/app/sw.js
    networks:
      - sky0cloud_net

  # Admin Panel - No reset required, just points to your Tuwunel
  synapse-admin:
    image: awesometechnologies/synapse-admin
    container_name: synapse-admin
    restart: unless-stopped
    networks:
      - sky0cloud_net

  # coturn:
  #   image: coturn/coturn
