services:
  conduwuit:
    image: forgejo.ellis.link/continuwuation/continuwuity:latest
    container_name: conduwuit-skyservers
    restart: unless-stopped
    ports:
      - "6167:8008"
    environment:
      CONDUWUIT_SERVER_NAME: "sky0cloud.dpdns.org"
      CONDUWUIT_DATABASE_PATH: "/var/lib/conduwuit"
      CONDUWUIT_PORT: 8008
      CONDUWUIT_ADDRESS: "0.0.0.0"
      CONDUWUIT_ALLOW_REGISTRATION: "true"
      CONDUWUIT_REGISTRATION_TOKEN: "only_us"
      CONDUWUIT_REQUEST_CONN_TIMEOUT: 30
      CONDUWUIT_REQUEST_TOTAL_TIMEOUT: 300
    volumes:
      - ./db:/var/lib/conduwuit
      - ./conduwuit/config.toml:/etc/conduwuit/conduwuit.toml:ro
    networks:
      - sky0cloud-net
    healthcheck:
      # Use a more universal check that doesn't rely on wget
      test: ["CMD-SHELL", "echo > /dev/tcp/127.0.0.1/8008 || exit 1"]
      interval: 30s # Give it more breathing room
      timeout: 10s
      retries: 5
      start_period: 60s # Give the database 1 minute to wake up before checking

  element-web:
    image: vectorim/element-web:latest
    container_name: element-skyservers
    restart: unless-stopped
    volumes:
      - ./branding/config.json:/usr/share/nginx/html/config.json
      - ./branding/welcome/index.html:/usr/share/nginx/html/welcome.html
      - ./branding/welcome/welcome.js:/usr/share/nginx/html/welcome.js
      - ./branding/welcome/style.css:/usr/share/nginx/html/welcome-style.css
      - ./branding/logo.png:/usr/share/nginx/html/logo.png
      - ./branding/logo.png:/usr/share/nginx/html/apple-touch-icon.png
      - ./branding/background.jpg:/usr/share/nginx/html/background.jpg
      - ./branding/manifest.json:/usr/share/nginx/html/manifest.json
      - ./branding/sw.js:/usr/share/nginx/html/sw.js
    networks:
      - sky0cloud-net

  caddy:
    image: caddy:latest
    container_name: caddy-proxy
    restart: unless-stopped
    depends_on:
      conduwuit:
        condition: service_started
      element-web:
        condition: service_started
    ports:
      - "8081:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - sky0cloud-net

networks:
  sky0cloud-net:
    driver: bridge
