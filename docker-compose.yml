services:
  tuwunel:
    image: ghcr.io/matrix-construct/tuwunel:latest
    container_name: sky0cloud-tuwunel
    volumes:
      - ./tuwunel/database:/data           # <- mount database folder
      - ./tuwunel/tuwunel.toml:/etc/tuwunel/config.toml:ro
    environment:
      - TZ=UTC
      - TUWUNEL_CONFIG=/etc/tuwunel/config.toml
    restart: unless-stopped
    networks:
      - internal

  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element
    volumes:
      - ./element/config.json:/app/config.json:ro
      - ./element/config.sky0cloud.dpdns.org.json:/app/config.sky0cloud.dpdns.org.json:ro
      - ./element/icon.png:/app/icon.png:ro
      - ./element/background.jpg:/app/background.jpg:ro
      - ./element/sw.js:/app/sw.js:ro
    environment:
      - TZ=UTC
    restart: unless-stopped
    networks:
      - internal
    
  caddy:
    image: caddy:2
    container_name: sky0cloud-caddy
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./well-known:/srv/well-known:ro
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    networks:
      - internal

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  internal:
    driver: bridge
