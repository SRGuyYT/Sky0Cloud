services:
  tuwunel:
    image: ghcr.io/matrix-construct/tuwunel:latest
    restart: unless-stopped
    expose:
      - "6167"
    volumes:
      - tuwunel_data:/data
      - ./tuwunel/tuwunel.toml:/etc/tuwunel/config.toml:ro
    environment:
      TZ: UTC
      TUWUNEL_CONFIG: /etc/tuwunel/config.toml
    networks:
      - sky0cloud_net

  element-web:
    image: vectorim/element-web:latest
    restart: unless-stopped
    networks:
      - sky0cloud_net

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./element:/srv/element:ro
      - ./.well-known:/srv/element/.well-known:ro # Mounts the folder you just checked
      - ./config.json:/srv/element/config.json:ro
      - ./welcome.html:/srv/element/welcome.html:ro
      - ./element/icon.png:/srv/element/icon.png:ro
      - ./element/background.jpg:/srv/element/background.jpg:ro
      - caddy_data:/data
    networks:
      - sky0cloud_net

volumes:
  tuwunel_data:
  caddy_data:

networks:
  sky0cloud_net:
    name: sky0cloud_net
