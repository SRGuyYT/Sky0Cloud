services:
  tuwunel:
    image: ghcr.io/matrix-construct/tuwunel:latest
    restart: unless-stopped
    expose:
      - "6167"
    volumes:
      - tuwunel_data:/data
      - ./tuwunel/tuwunel.toml:/etc/tuwunel/config.toml:ro
    environment:
      - TZ=UTC
      - TUWUNEL_CONFIG=/etc/tuwunel/config.toml
      # These MUST match the keys in your .env file
      - TUWUNEL_EMAIL_SMTP_HOST=${SMTP_HOST}
      - TUWUNEL_EMAIL_SMTP_PORT=${SMTP_PORT}
      - TUWUNEL_EMAIL_SMTP_USER=${SMTP_USER}
      - TUWUNEL_EMAIL_SMTP_PASS=${SMTP_PASS}
      - TUWUNEL_EMAIL_SMTP_FROM=${SMTP_FROM}
      - TUWUNEL_EMAIL_REQUIRE_VERIFICATION=false
      - TUWUNEL_ALLOW_REGISTRATION=true
    networks:
      - sky0cloud_net

  element-web:
    image: vectorim/element-web:latest
    restart: unless-stopped
    networks:
      - sky0cloud_net

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./element:/srv/element:ro
      - caddy_data:/data
    networks:
      - sky0cloud_net

volumes:
  tuwunel_data:
  caddy_data:

networks:
  sky0cloud_net:
    name: sky0cloud_net
