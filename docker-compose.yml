services:
  conduwuit:
    build:
      context: ./conduwuit
    image: sky0cloud/conduwuit:local
    container_name: sky0cloud-conduwuit
    volumes:
      - sky0cloud_data:/data
      - ./conduwuit/config:/opt/sky0cloud/config:ro
    environment:
      - TZ=UTC
      - CONDUIT_CONFIG=/opt/sky0cloud/config/default.config.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep conduwuit || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    pull_policy: never

  element-web:
    build:
      context: ./element
    image: sky0cloud/element-web:local
    container_name: sky0cloud-element
    volumes:
      - sky0cloud_data:/data:rw
    environment:
      - TZ=UTC
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'Element' /opt/sky0cloud/README.md || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 3
    pull_policy: never

  caddy:
    image: caddy:2
    container_name: sky0cloud-caddy
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "caddy", "list-modules"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Caddy must be able to write certs; do not set read_only: true

volumes:
  sky0cloud_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
