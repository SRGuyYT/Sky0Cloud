services:
  conduwuit:
    image: ghcr.io/matrix-construct/tuwunel:latest
    container_name: sky0cloud-conduwuit
    volumes:
      - conduwuit_data:/data
      - ./conduwuit/conduwuit.toml:/etc/conduwuit/conduwuit.toml:ro
    environment:
      - TZ=UTC
      - CONDUIT_CONFIG=/etc/conduwuit/conduwuit.toml
      - CONDUWUIT_CONFIG=/etc/conduwuit/conduwuit.toml
    restart: unless-stopped
    networks:
      - internal

  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element
    volumes:
      - ./element/tmp-element-web-config:/tmp/element-web-config:rw
      - ./element/background.jpg:/app/background.jpg:ro
      - ./element/icon.png:/app/icon.png:ro
      - ./element/welcome.html:/usr/share/nginx/html/welcome.html:ro
      - ./element/sw.js:/usr/share/nginx/html/sw.js:ro
    environment:
      - TZ=UTC
    restart: unless-stopped
    networks:
      internal:
        aliases:
          - element-web

  caddy:
    image: caddy:2
    container_name: sky0cloud-caddy
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./well-known:/srv/well-known:ro
      - ./element:/srv/element:ro
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    networks:
      - internal

volumes:
  conduwuit_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  internal:
    driver: bridge
