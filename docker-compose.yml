services:
  conduwuit:
    image: ghcr.io/matrix-construct/tuwunel:latest
    container_name: sky0cloud-conduwuit
    volumes:
      - conduwuit_data:/data
      - ./conduwuit/conduwuit.toml:/etc/conduwuit/conduwuit.toml:ro
    environment:
      - TZ=UTC
      - CONDUIT_CONFIG=/etc/conduwuit/conduwuit.toml
      - CONDUWUIT_CONFIG=/etc/conduwuit/conduwuit.toml
    restart: unless-stopped

  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element
    volumes:
      - ./element/config.json:/app/config.json:ro
      - ./element/config.sky0cloud.dpdns.org.json:/app/config.sky0cloud.dpdns.org.json:ro
      - ./element/welcome.html:/app/welcome.html:ro
      - ./element/background.jpg:/app/background.jpg:ro
      - ./element/icon.png:/app/icon.png:ro
    environment:
      - TZ=UTC
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: sky0cloud-caddy
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./well-known:/srv/well-known:ro
      - ./element:/srv/element:ro
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

volumes:
  conduwuit_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
