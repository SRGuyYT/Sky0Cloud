services:
  tuwunel:
    image: ghcr.io/matrix-construct/tuwunel:latest
    container_name: tuwunel
    restart: unless-stopped
    expose:
      - "6167"
    volumes:
      - ./tuwunel_data:/data
      - ./tuwunel/tuwunel.toml:/etc/tuwunel/config.toml:ro
    environment:
      - TZ=UTC
      - TUWUNEL_CONFIG=/etc/tuwunel/config.toml
    networks:
      - sky0cloud_net

  element-web:
    image: vectorim/element-web:latest
    container_name: element-web
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./element/config.json:/app/config.json:ro
    networks:
      - sky0cloud_net

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - sky0cloud_net

networks:
  sky0cloud_net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
