services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./certs:/certs
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - element-web
      - tuwunel

  element-web:
    image: vectorim/element-web:latest
    container_name: element-web
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json

  tuwunel:
    image: ghcr.io/matrix-construct/tuwunel:latest
    container_name: tuwunel
    restart: unless-stopped
    command: ["-c", "/etc/tuwunel.toml"]
    volumes:
      - ./tuwunel/tuwunel.toml:/etc/tuwunel.toml
      - ./tuwunel_data:/data

  synapse-admin:
    image: etkecc/synapse-admin:latest
    container_name: synapse-admin
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
